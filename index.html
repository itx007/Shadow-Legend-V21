<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Legend V21 - Pro Edit</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Premium UI */
        .ui-layer { position: absolute; top: 25px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .health-box { width: 42%; }
        .name { color: #ffd700; font-size: 14px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .hp-bar { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border: 1.5px solid #ffd700; border-radius: 4px; position: relative; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.2s ease-out; }
        #p1-hp { background: linear-gradient(90deg, #ffd700, #ffaa00); box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        #p2-hp { background: linear-gradient(-90deg, #ff0000, #880000); box-shadow: 0 0 15px rgba(255,0,0,0.4); }

        /* Smooth Controls */
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; }
        .joystick, .actions { display: flex; gap: 12px; pointer-events: auto; }
        .btn { width: 65px; height: 65px; background: rgba(0,0,0,0.7); border: 2px solid rgba(255,215,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffd700; font-size: 24px; backdrop-filter: blur(8px); transition: 0.1s; }
        .btn:active { transform: scale(1.1); border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.4); }
        .btn-atk { border-color: #00ffff; color: #00ffff; }
        
        .credit { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,215,0,0.5); font-size: 11px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="ui-layer">
        <div class="health-box">
            <div class="name">DOCTOR DARK</div>
            <div class="hp-bar"><div id="p1-hp" class="hp-fill"></div></div>
        </div>
        <div class="health-box" style="text-align: right;">
            <div class="name">SHADOW BOSS</div>
            <div class="hp-bar"><div id="p2-hp" class="hp-fill"></div></div>
        </div>
    </div>

    <canvas id="game"></canvas>
    <div class="credit">CODED BY DOCTOR DARK</div>

    <div class="controls">
        <div class="joystick">
            <div class="btn" onmousedown="move('l')" ontouchstart="move('l')">◀</div>
            <div class="btn" onmousedown="move('r')" ontouchstart="move('r')">▶</div>
        </div>
        <div class="actions">
            <div class="btn btn-atk" onmousedown="attack()" ontouchstart="attack()">⚔️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Physics Config
        const groundY = canvas.height - 120;
        let shake = 0;

        class ShadowPlayer {
            constructor(x, color, side) {
                this.x = x; this.y = groundY;
                this.w = 70; this.h = 180;
                this.color = color;
                this.side = side; // 1 for right, -1 for left
                this.hp = 100;
                this.vx = 0;
                this.isAttacking = false;
                this.atkFrame = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.side, 1);
                
                // Shadow Aura (Madham Roshni)
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.fillStyle = "#050505";

                // Detailed Shadow Body
                ctx.beginPath();
                ctx.arc(0, -this.h + 20, 24, 0, Math.PI*2); // Head
                ctx.fill();
                
                ctx.fillRect(-20, -this.h + 45, 40, 80); // Torso
                ctx.fillRect(-18, -60, 15, 60); // Leg 1
                ctx.fillRect(3, -60, 15, 60); // Leg 2
                
                // Sword Drawing
                ctx.shadowBlur = 15;
                ctx.strokeStyle = (this.color.includes('255, 0')) ? "#ff0000" : "#00ffff";
                ctx.lineWidth = 5;
                ctx.beginPath();
                if(this.isAttacking) {
                    ctx.moveTo(20, -100);
                    ctx.lineTo(120, -90 + Math.sin(this.atkFrame)*20);
                    ctx.stroke();
                } else {
                    ctx.moveTo(15, -100);
                    ctx.lineTo(60, -160);
                    ctx.stroke();
                }
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.vx *= 0.85; // Friction for smoothness
                if(this.isAttacking) {
                    this.atkFrame++;
                    if(this.atkFrame > 15) { this.isAttacking = false; this.atkFrame = 0; }
                }
                // Border constraint
                this.x = Math.max(50, Math.min(canvas.width - 50, this.x));
            }
        }

        const p1 = new ShadowPlayer(canvas.width * 0.2, "rgba(0, 255, 255, 0.4)", 1);
        const p2 = new ShadowPlayer(canvas.width * 0.8, "rgba(255, 0, 0, 0.4)", -1);

        function move(dir) {
            if(dir === 'l') { p1.vx = -12; p1.side = -1; }
            if(dir === 'r') { p1.vx = 12; p1.side = 1; }
        }

        function attack() {
            p1.isAttacking = true;
            let dist = Math.abs(p1.x - p2.x);
            if(dist < 150) {
                p2.hp -= 8;
                p2.vx = p1.side * 15; // Knockback effect
                shake = 10;
            }
        }

        // Background Buildings
        const bgs = Array.from({length: 10}, () => ({
            x: Math.random() * canvas.width,
            w: 80 + Math.random() * 120,
            h: 300 + Math.random() * 300,
            op: 0.3 + Math.random() * 0.4
        }));

        function animate() {
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if(shake > 0) {
                ctx.translate(Math.random()*shake, Math.random()*shake);
                shake *= 0.9;
            }

            // Draw Background Buildings
            bgs.forEach(b => {
                ctx.fillStyle = `rgba(10, 10, 15, ${b.op})`;
                ctx.fillRect(b.x, groundY - b.h, b.w, b.h);
            });

            // Ground
            ctx.strokeStyle = "rgba(255, 215, 0, 0.2)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            p1.update(); p2.update();
            
            // AI simple follow
            if(Math.abs(p1.x - p2.x) > 130) {
                p2.vx = (p1.x > p2.x) ? 2 : -2;
                p2.side = (p1.x > p2.x) ? 1 : -1;
            }

            p1.draw(); p2.draw();
            ctx.restore();

            document.getElementById('p1-hp').style.width = p1.hp + "%";
            document.getElementById('p2-hp').style.width = p2.hp + "%";

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
