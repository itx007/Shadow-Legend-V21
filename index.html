<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Dark: Shadow Legend V21</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Madham UI (Soft Glow) */
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; pointer-events: none; }
        .bar-wrap { width: 35%; }
        .label { color: #ffd700; font-size: 14px; letter-spacing: 2px; text-shadow: 0 0 5px rgba(255,215,0,0.5); margin-bottom: 5px; }
        .bar { width: 100%; height: 12px; background: rgba(50,50,50,0.5); border: 1px solid #ffd700; border-radius: 10px; overflow: hidden; }
        .hp { height: 100%; width: 100%; transition: width 0.3s; }
        #p-hp { background: linear-gradient(90deg, #ffd700, #ff8c00); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        #e-hp { background: linear-gradient(-90deg, #ff0000, #800000); box-shadow: 0 0 10px rgba(255,0,0,0.3); }

        /* Controls */
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .btn-grp { display: flex; gap: 15px; pointer-events: auto; }
        .btn { width: 65px; height: 65px; border: 2px solid rgba(255,215,0,0.4); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #ffd700; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); font-size: 24px; }
        .btn:active { transform: scale(0.9); border-color: #00ffff; color: #00ffff; }
        .sp-btn { border-color: rgba(255,0,0,0.5); color: red; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="bar-wrap">
            <div class="label">PLAYER</div>
            <div class="bar"><div id="p-hp" class="hp"></div></div>
        </div>
        <div class="bar-wrap" style="text-align: right;">
            <div class="label">SHADOW BOSS</div>
            <div class="bar"><div id="e-hp" class="hp"></div></div>
        </div>
    </div>

    <canvas id="stage"></canvas>

    <div class="controls">
        <div class="btn-grp">
            <div class="btn" ontouchstart="input('l')">◀</div>
            <div class="btn" ontouchstart="input('u')">▲</div>
            <div class="btn" ontouchstart="input('r')">▶</div>
        </div>
        <div class="btn-grp">
            <div class="btn" ontouchstart="input('atk')">👊</div>
            <div class="btn sp-btn" ontouchstart="input('sp')">⚔️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stage');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class ShadowFighter {
            constructor(x, color, side) {
                this.x = x; this.y = canvas.height - 150;
                this.hp = 100; this.side = side; // 1 for Player, -1 for Boss
                this.color = color; // Glow color
                this.frame = 0; this.state = 'idle';
            }

            drawBody() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.side, 1);
                
                // Madham Roshni (Soft Glow)
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.fillStyle = "#0a0a0a"; // Pure Shadow body

                // Realistic Body Path (Detailed Silhouette)
                ctx.beginPath();
                // Head
                ctx.arc(0, -180, 22, 0, Math.PI * 2);
                // Neck to Shoulder
                ctx.moveTo(-10, -160); ctx.lineTo(-35, -150); ctx.lineTo(-30, -100);
                // Chest & Abs
                ctx.lineTo(-20, -60); ctx.lineTo(20, -60); ctx.lineTo(30, -100);
                ctx.lineTo(35, -150); ctx.lineTo(10, -160);
                // Legs
                ctx.moveTo(-15, -60); ctx.lineTo(-25, 0); // L-Leg
                ctx.moveTo(15, -60); ctx.lineTo(25, 0);   // R-Leg
                ctx.fill();

                // Weapon (Talwar)
                this.drawSword();
                ctx.restore();
            }

            drawSword() {
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.strokeStyle = (this.side === 1) ? "#00ffff" : "#ff0000"; // Player Blue, Boss Red
                ctx.shadowColor = ctx.strokeStyle;
                
                ctx.beginPath();
                if (this.state === 'atk') {
                    ctx.moveTo(20, -120); ctx.lineTo(130, -100); // Attack Swing
                } else {
                    ctx.moveTo(30, -130); ctx.lineTo(90, -180); // Idle Pose
                }
                ctx.stroke();
            }

            update() {
                if (this.state === 'atk') {
                    this.frame++;
                    if (this.frame > 10) { this.state = 'idle'; this.frame = 0; }
                }
            }
        }

        const p = new ShadowFighter(canvas.width * 0.25, "rgba(0, 255, 127, 0.4)", 1);
        const e = new ShadowFighter(canvas.width * 0.75, "rgba(255, 0, 0, 0.4)", -1);

        function input(type) {
            if (type === 'r') p.x += 20;
            if (type === 'l') p.x -= 20;
            if (type === 'atk') {
                p.state = 'atk';
                if (Math.abs(p.x - e.x) < 150) e.hp -= 5;
            }
            if (type === 'sp') {
                p.state = 'atk'; p.x += 50; // Dash attack
                if (Math.abs(p.x - e.x) < 200) e.hp -= 15;
            }
        }

        function loop() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Floor
            ctx.strokeStyle = "rgba(255, 215, 0, 0.2)";
            ctx.beginPath(); ctx.moveTo(0, canvas.height - 150); ctx.lineTo(canvas.width, canvas.height - 150); ctx.stroke();

            p.update(); p.drawBody();
            e.update(); e.drawBody();

            // UI
            document.getElementById('p-hp').style.width = p.hp + "%";
            document.getElementById('e-hp').style.width = e.hp + "%";

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
