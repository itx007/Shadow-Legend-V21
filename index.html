<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Dark: Shadow Legend V21</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; touch-action: none; font-family: 'Times New Roman', serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Health Bars & UI */
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .bar-container { width: 40%; }
        .name { color: #ffd700; font-size: 14px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px gold; }
        .bar { width: 100%; height: 12px; background: rgba(50,50,50,0.5); border: 2px solid #ffd700; border-radius: 6px; overflow: hidden; }
        .fill { height: 100%; width: 100%; transition: width 0.3s; }
        #p-hp { background: linear-gradient(90deg, #ffcc00, #ff6600); box-shadow: 0 0 15px gold; }
        #e-hp { background: linear-gradient(-90deg, #ff0000, #990000); box-shadow: 0 0 15px red; }

        /* Controls */
        .controls { position: absolute; bottom: 35px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 20; }
        .btn-grp { display: flex; gap: 15px; }
        .btn { width: 65px; height: 65px; background: rgba(0,0,0,0.7); border: 2px solid gold; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: gold; font-size: 24px; pointer-events: auto; }
        .btn:active { transform: scale(0.9); background: rgba(255, 215, 0, 0.3); }
        .btn-atk { border-color: cyan; color: cyan; border-radius: 50%; }

        .watermark { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,215,0,0.5); font-size: 10px; letter-spacing: 3px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="bar-container">
            <div class="name">PLAYER</div>
            <div class="bar"><div id="p-hp" class="fill"></div></div>
        </div>
        <div class="bar-container" style="text-align: right;">
            <div class="name">SHADOW BOSS</div>
            <div class="bar"><div id="e-hp" class="fill"></div></div>
        </div>
    </div>

    <canvas id="game"></canvas>
    <div class="watermark">CODED BY DOCTOR DARK</div>

    <div class="controls">
        <div class="btn-grp">
            <div class="btn" ontouchstart="input('l')">◀</div>
            <div class="btn" ontouchstart="input('u')">▲</div>
            <div class="btn" ontouchstart="input('r')">▶</div>
        </div>
        <div class="btn-grp">
            <div class="btn btn-atk" ontouchstart="input('atk')">⚔️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Fighter {
            constructor(x, color, side) {
                this.x = x; this.y = canvas.height - 150;
                this.w = 80; this.h = 200;
                this.hp = 100; this.side = side; this.color = color;
                this.vx = 0; this.isAtk = false; this.atkTimer = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.side, 1);
                
                // Shadow Glow
                ctx.shadowBlur = 30; ctx.shadowColor = this.color;
                ctx.fillStyle = "#0a0a0a";

                // Detailed Character Body
                ctx.beginPath();
                ctx.arc(0, -180, 25, 0, Math.PI*2); // Head
                ctx.fill();
                ctx.fillRect(-25, -150, 50, 90); // Torso
                ctx.fillRect(-20, -60, 18, 60); // L-Leg
                ctx.fillRect(2, -60, 18, 60);  // R-Leg

                // Sword (Talwar)
                ctx.strokeStyle = (this.side === 1) ? "#00ffff" : "#ff0000";
                ctx.lineWidth = 5; ctx.shadowBlur = 15;
                ctx.beginPath();
                if(this.isAtk) {
                    ctx.moveTo(25, -100); ctx.lineTo(130, -90); // Hit Pose
                } else {
                    ctx.moveTo(30, -110); ctx.lineTo(90, -180); // Idle Pose
                }
                ctx.stroke();
                ctx.restore();
            }

            update() {
                this.x += this.vx; this.vx *= 0.8;
                if(this.atkTimer > 0) this.atkTimer--; else this.isAtk = false;
                this.x = Math.max(50, Math.min(canvas.width-50, this.x));
            }
        }

        const p = new Fighter(canvas.width * 0.2, "rgba(0, 255, 255, 0.4)", 1);
        const e = new Fighter(canvas.width * 0.8, "rgba(255, 0, 0, 0.4)", -1);

        function input(type) {
            if(type === 'l') { p.vx = -15; p.side = -1; }
            if(type === 'r') { p.vx = 15; p.side = 1; }
            if(type === 'u' && p.y >= canvas.height - 155) { /* Jump */ }
            if(type === 'atk') { 
                p.isAtk = true; p.atkTimer = 10;
                if(Math.abs(p.x - e.x) < 160) { e.hp -= 5; e.vx = p.side * 10; }
            }
        }

        function drawScene() {
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gate & Buildings Background
            ctx.fillStyle = "rgba(15, 15, 20, 0.8)";
            // Left Pillar
            ctx.fillRect(canvas.width * 0.1, canvas.height - 600, 60, 450);
            // Right Pillar
            ctx.fillRect(canvas.width * 0.85, canvas.height - 600, 60, 450);
            // Top Beam (Gate)
            ctx.fillRect(canvas.width * 0.1, canvas.height - 600, canvas.width * 0.8, 40);

            // Ground
            ctx.strokeStyle = "rgba(255, 215, 0, 0.2)";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, canvas.height-150); ctx.lineTo(canvas.width, canvas.height-150); ctx.stroke();

            p.update(); e.update();
            // Enemy AI simple move
            if(Math.abs(p.x - e.x) > 130) e.vx = (p.x > e.x ? 2 : -2);

            p.draw(); e.draw();

            document.getElementById('p-hp').style.width = p.hp + "%";
            document.getElementById('e-hp').style.width = e.hp + "%";

            requestAnimationFrame(drawScene);
        }
        drawScene();
    </script>
</body>
</html>
