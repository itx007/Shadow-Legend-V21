<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Dark: Shadow Legend V21</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Layer */
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .bar-wrap { width: 35%; }
        .label { color: #ffd700; font-size: 12px; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .bar { width: 100%; height: 10px; background: rgba(50,50,50,0.4); border: 1.5px solid #ffd700; border-radius: 5px; overflow: hidden; }
        .hp { height: 100%; width: 100%; transition: width 0.3s; }
        #p-hp { background: linear-gradient(90deg, #ffcc00, #ff8c00); box-shadow: 0 0 10px rgba(255,200,0,0.3); }
        #e-hp { background: linear-gradient(-90deg, #ff3300, #990000); box-shadow: 0 0 10px rgba(255,0,0,0.3); }

        /* Controls */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn-box { display: flex; gap: 15px; pointer-events: auto; }
        .btn { width: 60px; height: 60px; border: 2px solid rgba(255,215,0,0.5); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #ffd700; background: rgba(0,0,0,0.6); font-size: 22px; backdrop-filter: blur(5px); }
        .btn:active { transform: scale(0.9); background: rgba(255,215,0,0.2); }
        
        .watermark { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #ffd700; font-size: 10px; letter-spacing: 2px; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="bar-wrap">
            <div class="label">PLAYER</div>
            <div class="bar"><div id="p-hp" class="hp"></div></div>
        </div>
        <div class="bar-wrap" style="text-align: right;">
            <div class="label">SHADOW BOSS</div>
            <div class="bar"><div id="e-hp" class="hp"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="watermark">CODED BY DOCTOR DARK</div>

    <div class="controls">
        <div class="btn-box">
            <div class="btn" ontouchstart="input('l')">◀</div>
            <div class="btn" ontouchstart="input('u')">▲</div>
            <div class="btn" ontouchstart="input('r')">▶</div>
        </div>
        <div class="btn-box">
            <div class="btn" style="border-color:#00ffff; color:#00ffff;" ontouchstart="input('atk')">👊</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Background Buildings Logic
        const buildings = [];
        for(let i=0; i<15; i++) {
            buildings.push({
                x: Math.random() * canvas.width,
                w: 60 + Math.random() * 100,
                h: 200 + Math.random() * 400,
                color: `rgba(15, 15, 20, ${0.5 + Math.random() * 0.5})`
            });
        }

        class Fighter {
            constructor(x, side, glowColor) {
                this.x = x; this.y = canvas.height - 150;
                this.side = side; this.glow = glowColor;
                this.hp = 100; this.state = 'idle';
                this.timer = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.side, 1);
                
                // Shadow Glow (Madham Roshni)
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.glow;
                ctx.fillStyle = "#080808";

                // Clean Silhouette Body
                ctx.beginPath();
                // Head
                ctx.arc(0, -180, 25, 0, Math.PI * 2);
                // Body
                ctx.moveTo(-15, -155);
                ctx.lineTo(-30, -145); ctx.lineTo(-20, -60); // Torso Left
                ctx.lineTo(20, -60); ctx.lineTo(30, -145);  // Torso Right
                ctx.lineTo(15, -155);
                ctx.fill();

                // Weapons (Sword)
                ctx.shadowBlur = 15;
                ctx.strokeStyle = (this.side === 1) ? "#00ffff" : "#ff3300";
                ctx.shadowColor = ctx.strokeStyle;
                ctx.lineWidth = 5;
                ctx.beginPath();
                if(this.state === 'atk') {
                    ctx.moveTo(25, -110); ctx.lineTo(130, -100);
                } else {
                    ctx.moveTo(30, -120); ctx.lineTo(100, -180);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        const p = new Fighter(canvas.width * 0.2, 1, "rgba(0, 255, 255, 0.3)");
        const e = new Fighter(canvas.width * 0.8, -1, "rgba(255, 0, 0, 0.3)");

        function input(type) {
            if(type === 'r') p.x += 25;
            if(type === 'l') p.x -= 25;
            if(type === 'u' && p.y >= canvas.height - 155) { /* Jump logic */ }
            if(type === 'atk') {
                p.state = 'atk'; p.timer = 10;
                if(Math.abs(p.x - e.x) < 160) e.hp -= 5;
            }
        }

        function drawFrame() {
            // Dark night background
            ctx.fillStyle = "#020205";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Buildings (Shadow Background)
            buildings.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, canvas.height - b.h - 150, b.w, b.h);
                // Windows lighting
                if(Math.random() > 0.98) ctx.fillStyle = "rgba(255,255,200,0.2)";
                ctx.fillRect(b.x + 10, canvas.height - b.h + 20 - 150, 5, 5);
            });

            // Floor Line
            ctx.strokeStyle = "rgba(255, 215, 0, 0.15)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, canvas.height-150); ctx.lineTo(canvas.width, canvas.height-150); ctx.stroke();

            // Update States
            if(p.timer > 0) p.timer--; else p.state = 'idle';

            p.draw(); e.draw();

            // UI
            document.getElementById('p-hp').style.width = p.hp + "%";
            document.getElementById('e-hp').style.width = e.hp + "%";

            requestAnimationFrame(drawFrame);
        }
        drawFrame();
    </script>
</body>
</html>
