<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Dark: Shadow Legend V21</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Health Bars */
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; z-index: 10; }
        .bar-wrap { width: 38%; }
        .label { color: #ffd700; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .bar { width: 100%; height: 12px; background: rgba(50,50,50,0.5); border: 2px solid #ffd700; border-radius: 6px; overflow: hidden; }
        .hp { height: 100%; width: 100%; transition: width 0.3s; }
        #p-hp { background: linear-gradient(90deg, #ffd700, #ff8c00); }
        #e-hp { background: linear-gradient(-90deg, #ff3300, #990000); }

        /* Original Game Controls */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn-box { display: flex; gap: 15px; }
        .btn { width: 60px; height: 60px; border: 2px solid #ffd700; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #ffd700; background: rgba(0,0,0,0.6); font-size: 24px; pointer-events: auto; }
        .btn:active { background: rgba(255, 215, 0, 0.3); transform: scale(0.9); }
        
        .watermark { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #ffd700; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="bar-wrap">
            <div class="label">PLAYER</div>
            <div class="bar"><div id="p-hp" class="hp"></div></div>
        </div>
        <div class="bar-wrap" style="text-align: right;">
            <div class="label">SHADOW BOSS</div>
            <div class="bar"><div id="e-hp" class="hp"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="watermark">CODED BY DOCTOR DARK</div>

    <div class="controls">
        <div class="btn-box">
            <div class="btn" ontouchstart="move('l')">◀</div>
            <div class="btn" ontouchstart="move('u')">▲</div>
            <div class="btn" ontouchstart="move('r')">▶</div>
        </div>
        <div class="btn-box">
            <div class="btn" style="border-color:#00ffff; color:#00ffff;" ontouchstart="attack()">👊</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Fighter {
            constructor(x, side, glow) {
                this.x = x; this.y = canvas.height - 150;
                this.side = side; this.glow = glow;
                this.hp = 100; this.state = 'idle';
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.side, 1);
                
                // Shadow Effect
                ctx.shadowBlur = 25; ctx.shadowColor = this.glow;
                ctx.fillStyle = "#080808";

                // Character Shape (Shadow Silhouette)
                ctx.beginPath();
                ctx.arc(0, -180, 25, 0, Math.PI * 2); // Head
                ctx.fillRect(-20, -155, 40, 95);      // Body
                ctx.fill();

                // Weapon
                ctx.strokeStyle = (this.side === 1) ? "cyan" : "red";
                ctx.lineWidth = 5;
                ctx.beginPath();
                if(this.state === 'atk') {
                    ctx.moveTo(20, -110); ctx.lineTo(120, -100);
                } else {
                    ctx.moveTo(25, -120); ctx.lineTo(80, -180);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        const p = new Fighter(canvas.width * 0.25, 1, "cyan");
        const e = new Fighter(canvas.width * 0.75, -1, "red");

        function move(dir) {
            if(dir === 'l') p.x -= 20;
            if(dir === 'r') p.x += 20;
        }

        function attack() {
            p.state = 'atk';
            if(Math.abs(p.x - e.x) < 150) e.hp -= 5;
            setTimeout(() => p.state = 'idle', 200);
        }

        function update() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground Line
            ctx.strokeStyle = "rgba(255,215,0,0.2)";
            ctx.beginPath(); ctx.moveTo(0, canvas.height-150); ctx.lineTo(canvas.width, canvas.height-150); ctx.stroke();

            p.draw(); e.draw();
            document.getElementById('p-hp').style.width = p.hp + "%";
            document.getElementById('e-hp').style.width = e.hp + "%";
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
