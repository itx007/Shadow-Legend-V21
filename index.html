<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr Dark: Shadow Legend V21 - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');
        
        body { 
            margin: 0; 
            background: #050505; 
            font-family: 'Cinzel', serif; 
            overflow: hidden; 
            touch-action: none;
        }
        
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        
        /* Health Bars */
        .ui { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 40px;
            pointer-events: none; 
            box-sizing: border-box;
        }
        
        .bar-container { width: 40%; position: relative; }
        
        .bar { 
            width: 100%;
            height: 20px; 
            background: #1a1a1a; 
            border: 2px solid #ffd700; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        
        .fill { 
            height: 100%; 
            width: 100%; 
            background: linear-gradient(90deg, #ff0000, #ff6600, #ffd700); 
            transition: width 0.3s ease-out;
        }
        
        .enemy-fill { background: linear-gradient(90deg, #660000, #ff0000); transform-origin: right; }
        
        .name-tag {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            letter-spacing: 2px;
        }
        
        /* Mobile Controls */
        .controls { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 30px; 
            z-index: 100; 
            pointer-events: none;
            box-sizing: border-box;
        }
        
        .move-btns { 
            display: grid; 
            grid-template-columns: repeat(3, 60px); 
            grid-template-rows: repeat(2, 60px);
            gap: 8px; 
            pointer-events: auto; 
        }
        
        .action-btns { 
            display: flex; 
            gap: 15px; 
            align-items: flex-end;
            pointer-events: auto; 
        }
        
        .btn { 
            width: 60px; 
            height: 60px; 
            background: rgba(0,0,0,0.6); 
            border: 2px solid #ffd700; 
            border-radius: 12px; 
            color: #ffd700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        
        .btn-hit { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 3px solid #00ffff; 
            background: rgba(0,255,255,0.1); 
            font-size: 1.8rem; 
            box-shadow: 0 0 20px rgba(0,255,255,0.4);
        }

        .round-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255,215,0,0.8);
            opacity: 0;
            pointer-events: none;
        }
        .round-show { opacity: 1; animation: pulse 1s ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.2); } }
    </style>
</head>
<body>
    <div class="ui">
        <div class="bar-container">
            <div class="name-tag">PLAYER</div>
            <div class="bar"><div id="pHealth" class="fill"></div></div>
        </div>
        <div class="bar-container" style="text-align: right;">
            <div class="name-tag">SHADOW ENEMY</div>
            <div class="bar"><div id="eHealth" class="fill enemy-fill"></div></div>
        </div>
    </div>
    
    <div class="round-indicator" id="roundIndicator">ROUND 1</div>
    <canvas id="c"></canvas>
    
    <div class="controls">
        <div class="move-btns">
            <div style="grid-column:2; grid-row:1" class="btn" ontouchstart="move('u')">▲</div>
            <div style="grid-column:1; grid-row:2" class="btn" ontouchstart="move('l')">◀</div>
            <div style="grid-column:3; grid-row:2" class="btn" ontouchstart="move('r')">▶</div>
        </div>
        <div class="action-btns">
            <div class="btn btn-hit" ontouchstart="hit('p')">👊</div>
            <div class="btn btn-hit" ontouchstart="hit('k')">🦶</div>
            <div class="btn btn-hit" style="border-color: #ffd700; color: #ffd700;" ontouchstart="hit('s')">⚔️</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let shake = 0;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resize();
        window.addEventListener('resize', resize);

        class ParticleSystem {
            constructor() { this.particles = []; }
            emit(x, y, color, count = 10, speed = 8) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed * Math.random(),
                        vy: Math.sin(angle) * speed * Math.random(),
                        life: 1.0, color: color, size: Math.random() * 4 + 2
                    });
                }
            }
            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.03;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }
            draw(ctx) {
                this.particles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });
            }
        }
        
        const particles = new ParticleSystem();

        class Fighter {
            constructor(x, isPlayer) {
                this.x = x; this.y = window.innerHeight - 150;
                this.vx = 0; this.vy = 0; this.w = 80; this.h = 200;
                this.isPlayer = isPlayer; this.facing = isPlayer ? 1 : -1;
                this.hp = 100; this.state = 'idle'; this.stateTimer = 0;
            }
            update() {
                this.vy += 0.8; this.vx *= 0.85; this.x += this.vx; this.y += this.vy;
                if (this.y >= window.innerHeight - 150) { this.y = window.innerHeight - 150; this.vy = 0; }
                this.stateTimer++;
                if (this.state !== 'idle' && this.stateTimer > 25) this.state = 'idle';
            }
            draw(ctx) {
                ctx.save();
                ctx.shadowBlur = 20; ctx.shadowColor = this.isPlayer ? '#00ffff' : '#ff0000';
                ctx.translate(this.x, this.y);
                ctx.fillStyle = '#0a0a0a';
                ctx.beginPath(); ctx.arc(0, -this.h + 25, 25, 0, Math.PI * 2); ctx.fill();
                ctx.fillRect(-this.w/2, -this.h + 50, this.w, this.h - 100);
                if (this.state === 's') {
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(20, -100); ctx.lineTo(20 + this.facing * 150, -110); ctx.stroke();
                }
                ctx.restore();
            }
        }

        let p = new Fighter(window.innerWidth * 0.3, true);
        let e = new Fighter(window.innerWidth * 0.7, false);

        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            
            ctx.save();
            if (shake > 0) { ctx.translate(Math.random() * shake, Math.random() * shake); shake *= 0.9; }
            
            p.update(); e.update();
            p.draw(ctx); e.draw(ctx);
            particles.update(); particles.draw(ctx);
            
            // Basic Enemy AI
            if (e.x > p.x + 150) e.vx = -2; else if (e.x < p.x - 150) e.vx = 2;
            if (Math.random() < 0.02 && Math.abs(p.x - e.x) < 200) e.state = 'p';

            // Health Update
            document.getElementById('pHealth').style.width = p.hp + '%';
            document.getElementById('eHealth').style.width = e.hp + '%';
            
            ctx.restore();
            requestAnimationFrame(draw);
        }

        function move(dir) {
            if (dir === 'l') { p.vx = -15; p.facing = -1; }
            if (dir === 'r') { p.vx = 15; p.facing = 1; }
            if (dir === 'u' && p.y >= window.innerHeight - 155) p.vy = -18;
        }

        function hit(type) {
            p.state = type; p.stateTimer = 0;
            if (type === 's') {
                particles.emit(p.x + (p.facing * 100), p.y - 100, '#00ffff', 10, 5);
                shake = 8;
                if (Math.abs(p.x - e.x) < 250) e.hp -= 10;
            } else if (Math.abs(p.x - e.x) < 150) {
                e.hp -= 5; shake = 3;
            }
        }

        draw();
    </script>
</body>
</html>
