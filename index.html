<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Legend V21 - Entrance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        #game-canvas { display: none; } /* Game hidden during countdown */
        .progress-bar { transition: width 1s linear; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="redirect-panel" class="glass-panel w-full max-w-md rounded-3xl p-8 text-center relative overflow-hidden shadow-2xl">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-500 via-orange-500 to-red-500"></div>
        
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-yellow-500/10 rounded-full flex items-center justify-center text-yellow-500 border border-yellow-500/20">
                <span class="text-4xl">⚔️</span>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-yellow-500 mb-2">Shadow Legend</h1>
        <p class="text-gray-400 text-sm mb-8">Preparing the arena for <span class="text-yellow-500">Doctor Dark</span>...</p>

        <div class="mb-8">
            <div class="text-6xl font-black text-white mb-2" id="timer-display">5</div>
            <p class="text-gray-500 text-sm" id="timer-text">Arena opens in 5 seconds</p>
            
            <div class="w-full bg-gray-800 rounded-full h-2 mt-6 overflow-hidden">
                <div id="progress-bar" class="bg-yellow-500 h-full progress-bar" style="width: 100%"></div>
            </div>
        </div>

        <button onclick="startGameNow()" class="w-full py-4 rounded-2xl bg-yellow-500 text-black font-bold text-lg hover:bg-yellow-400 transition-all active:scale-95 shadow-lg shadow-yellow-500/20">
            ENTER ARENA NOW
        </button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const TARGET_SECONDS = 5;
        let timeLeft = TARGET_SECONDS;
        let countdown;

        function startCountdown() {
            countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-display').innerText = timeLeft;
                document.getElementById('progress-bar').style.width = (timeLeft / TARGET_SECONDS * 100) + "%";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    startGameNow();
                }
            }, 1000);
        }

        function startGameNow() {
            // Panel chhupao aur game dikhao
            document.getElementById('redirect-panel').style.display = 'none';
            document.getElementById('game-canvas').style.display = 'block';
            initGame(); // Game engine start karein
        }

        // --- Game Engine (Shadow Fight Coding) ---
        function initGame() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Character, Gate aur Fight logic yahan (Jaise pehle di thi)
            function drawFrame() {
                ctx.fillStyle = "#050505";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Gate Drawing
                ctx.fillStyle = "#111";
                ctx.fillRect(canvas.width * 0.1, canvas.height - 500, 50, 400); // Left Pillar
                ctx.fillRect(canvas.width * 0.85, canvas.height - 500, 50, 400); // Right Pillar
                ctx.fillRect(canvas.width * 0.1, canvas.height - 500, canvas.width * 0.8, 30); // Beam
                
                // Ground
                ctx.strokeStyle = "rgba(255, 215, 0, 0.3)";
                ctx.beginPath(); ctx.moveTo(0, canvas.height-100); ctx.lineTo(canvas.width, canvas.height-100); ctx.stroke();

                requestAnimationFrame(drawFrame);
            }
            drawFrame();
        }

        window.onload = startCountdown;
    </script>
</body>
</html>
